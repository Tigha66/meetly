<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="512" height="512" rx="102"/>
    </clipPath>
  </defs>
  <rect width="512" height="512" rx="102" fill="url(#grad)" clip-path="url(#clip)"/>
  <!-- Calendar body -->
  <rect x="135" y="155" width="242" height="220" rx="20" fill="#ffffff"/>
  <!-- Top bar -->
  <rect x="135" y="155" width="242" height="55" rx="20" fill="#4f46e5"/>
  <rect x="135" y="175" width="242" height="35" fill="#4f46e5"/>
  <!-- Ring left -->
  <circle cx="188" cy="130" r="8" fill="none" stroke="#4f46e5" stroke-width="6" stroke-linecap="round"/>
  <rect x="183" y="130" width="10" height="30" fill="none" stroke="#4f46e5" stroke-width="6" stroke-linecap="round"/>
  <!-- Ring right -->
  <circle cx="324" cy="130" r="8" fill="none" stroke="#4f46e5" stroke-width="6" stroke-linecap="round"/>
  <rect x="319" y="130" width="10" height="30" fill="none" stroke="#4f46e5" stroke-width="6" stroke-linecap="round"/>
  <!-- Lines -->
  <line x1="175" y1="250" x2="337" y2="250" stroke="#cbd5e1" stroke-width="5" stroke-linecap="round"/>
  <line x1="175" y1="285" x2="337" y2="285" stroke="#cbd5e1" stroke-width="5" stroke-linecap="round"/>
  <line x1="175" y1="320" x2="337" y2="320" stroke="#cbd5e1" stroke-width="5" stroke-linecap="round"/>
  <line x1="175" y1="355" x2="280" y2="355" stroke="#cbd5e1" stroke-width="5" stroke-linecap="round"/>
</svg>
